name: Build JAR

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 1.0.0)'
        required: false
        default: 'latest'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build JAR
        run: |
          jar cvf sakura-guacamole-${{ github.event.inputs.version }}.jar \
            guac-manifest.json \
            css \
            js \
            html \
            img

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sakura-guacamole-${{ github.event.inputs.version }}
          path: sakura-guacamole-${{ github.event.inputs.version }}.jar
          retention-days: 30

      - name: Create GitHub Release
        if: github.event.inputs.version != 'latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: sakura-guacamole v${{ github.event.inputs.version }}
          files: sakura-guacamole-${{ github.event.inputs.version }}.jar
          body: |
            Guacamole branding extension — sakura theme
            
            ## Installation
            Drop `sakura-guacamole-${{ github.event.inputs.version }}.jar` into your `extensions/` folder and restart Guacamole.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
